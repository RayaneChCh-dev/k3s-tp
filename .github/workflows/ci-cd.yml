name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USER: saphir10036
  IMAGE_BACKEND: devops-tp-rayane-backend
  IMAGE_FRONTEND: devops-tp-rayane-frontend
  K8S_NAMESPACE: devops-tp-rayane

jobs:
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest test_app.py -v
