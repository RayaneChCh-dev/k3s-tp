name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_USER: saphir10036
  IMAGE_BACKEND: devops-tp-rayane-backend
  IMAGE_FRONTEND: devops-tp-rayane-frontend
  K8S_NAMESPACE: devops-tp-rayane

jobs:
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        run: pytest test_app.py -v

  build-and-push:
    name: Build & push Docker images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

  deploy:
    name: Deploy to Azure VM (k3s)
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          script: |
            set -e
            export KUBECONFIG=$HOME/.kube/config

            # Pull des images côté VM (utile si le runtime ne le fait pas)
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            # Appliquer les manifests (idempotent)
            cd ~/devops-tp-rayane
            git fetch --all
            git reset --hard origin/main

            kubectl apply -f k8s/namespace.yml
            kubectl apply -f k8s/secret.yml
            kubectl apply -f k8s/db-deployment.yml
            kubectl apply -f k8s/backend-deployment.yml
            kubectl apply -f k8s/frontend-deployment.yml

            # Mettre à jour les images avec le tag du commit courant
            kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/backend \
              backend=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/frontend \
              frontend=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}

            # Attendre la fin du rollout (échec = pipeline rouge)
            kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/backend --timeout=120s
            kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/frontend --timeout=120s

            kubectl -n ${{ env.K8S_NAMESPACE }} get pods -o wide
