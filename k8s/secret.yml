# Secret contenant les credentials PostgreSQL.
# Les valeurs ci-dessous sont les defaults du TP ; en production ce fichier
# serait géré hors du repo (sealed-secrets, SOPS, External Secrets, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: devops-tp-rayane
type: Opaque
stringData:
  DB_NAME: "appdb"
  DB_USER: "appuser"
  DB_PASSWORD: "apppassword"
